<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>嘉義阿里山三天兩夜</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Noto Sans TC',sans-serif;
  margin:0;
  background:#fdf9f4;
  color:#2c3e50;
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#1a5c38,#2d8a56);
  color:white;
  text-align:center;
  padding:50px 20px;
}
.hero h1{font-size:28px;margin:10px 0}

/* CONTAINER */
.container{max-width:800px;margin:auto;padding:16px}

/* DAY */
.day{
  margin-top:30px;
}
.day h2{
  font-size:22px;
  border-left:6px solid #2d7a4f;
  padding-left:10px;
}

/* CARD */
.card{
  background:white;
  border-radius:12px;
  padding:14px;
  margin:12px 0;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

/* TITLE ROW */
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.map-btn{
  background:#2d7a4f;
  color:white;
  padding:6px 12px;
  border-radius:20px;
  text-decoration:none;
  font-size:14px;
}

/* IMAGE */
.image{
  margin-top:10px;
}
.image img{
  width:100%;
  border-radius:10px;
  height:150px;
  object-fit:cover;
}

/* ACCORDION */
.details{
  margin-top:10px;
  font-size:14px;
  color:#555;
  display:none;
}
.toggle{
  margin-top:8px;
  font-size:14px;
  color:#2d7a4f;
  cursor:pointer;
  font-weight:bold;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  background:#1a5c38;
  color:white;
  margin-top:40px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>嘉義・阿里山三天兩夜</h1>
  <div>4/26–4/28｜8人旅行</div>
</div>

<div class="container">

<!-- DAY1 -->
<div class="day">
<h2>Day1 台中 → 嘉義</h2>

<div class="card">
  <div class="row">
    <div>08:00 集合出發</div>
  </div>
</div>

<div class="card">
  <div class="row">
    <div>宮原眼科</div>
    <a class="map-btn" href="https://www.google.com/maps/search/?api=1&query=宮原眼科" target="_blank">地圖</a>
  </div>
  <div class="image">
    <img src="https://images.unsplash.com/photo-1582719478185-2f8d4e5b6c90" />
  </div>
  <div class="toggle" onclick="toggle(this)">查看詳細 ▼</div>
  <div class="details">
    台中人氣甜點店，必吃冰淇淋
  </div>
</div>

<div class="card">
  <div class="row">
    <div>奶油森林</div>
    <a class="map-btn" href="https://www.google.com/maps/search/?api=1&query=奶油森林嘉義" target="_blank">地圖</a>
  </div>
  <div class="image">
    <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836" />
  </div>
  <div class="toggle" onclick="toggle(this)">查看詳細 ▼</div>
  <div class="details">
    文青咖啡店，可休息拍照
  </div>
</div>

</div>

<!-- DAY2 -->
<div class="day">
<h2>Day2 阿里山</h2>

<div class="card">
  <div class="row">
    <div>阿里山森林園區</div>
    <a class="map-btn" href="https://www.google.com/maps/search/?api=1&query=阿里山" target="_blank">地圖</a>
  </div>
  <div class="image">
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" />
  </div>
  <div class="toggle" onclick="toggle(this)">查看詳細 ▼</div>
  <div class="details">
    建議走沼平步道＋小火車
  </div>
</div>

<div class="card">
  <div class="row">
    <div>永富苦茶油雞</div>
    <a class="map-btn" href="https://www.google.com/maps/search/?api=1&query=永富苦茶油雞" target="_blank">地圖</a>
  </div>
  <div class="toggle" onclick="toggle(this)">查看詳細 ▼</div>
  <div class="details">
    ⚠️ 需提前預訂（4/10前）
  </div>
</div>

<div class="card">
  <div class="row">
    <div>蘭潭水舞</div>
    <a class="map-btn" href="https://www.google.com/maps/search/?api=1&query=蘭潭水舞" target="_blank">地圖</a>
  </div>
  <div class="image">
    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" />
  </div>
  <div class="toggle" onclick="toggle(this)">查看詳細 ▼</div>
  <div class="details">
    建議19:30場次（需確認是否有演出）
  </div>
</div>

</div>

<!-- DAY3 -->
<div class="day">
<h2>Day3 回程</h2>

<div class="card">
  <div class="row">
    <div>故宮南院</div>
    <a class="map-btn" href="https://www.google.com/maps/search/?api=1&query=故宮南院" target="_blank">地圖</a>
  </div>
  <div class="image">
    <img src="https://images.unsplash.com/photo-1549693578-d683be217e58" />
  </div>
</div>

<div class="card">
  <div class="row">
    <div>佳家福客家料理</div>
    <a class="map-btn" href="https://www.google.com/maps/search/?api=1&query=佳家福客家料理" target="_blank">地圖</a>
  </div>
  <div class="toggle" onclick="toggle(this)">查看詳細 ▼</div>
  <div class="details">
    ⚠️ 已預訂 03-4945228
  </div>
</div>

</div>

</div>

<footer>
  祝旅途愉快 🌲
</footer>

<script>
function toggle(el){
  const detail = el.nextElementSibling;
  detail.style.display = detail.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
